<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Admina</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 860px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        .entry { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; background: white; }
        .entry.oczekujacy { border-left: 5px solid orange; }
        .entry.zatwierdzony { border-left: 5px solid green; }
        .entry.odrzucony { border-left: 5px solid red; opacity: 0.65; }
        .entry-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .entry-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn-zatwierdz { background: #2e7d32; color: white; }
        .btn-odrzuc { background: #c62828; color: white; }
        .btn-cofnij { background: #757575; color: white; }
        .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-oczekujacy { background: #fff3e0; color: #e65100; border: 1px solid orange; }
        .badge-zatwierdzony { background: #e8f5e9; color: #2e7d32; border: 1px solid green; }
        .badge-odrzucony { background: #ffebee; color: #c62828; border: 1px solid red; }
        .tabs { display: flex; gap: 8px; margin: 20px 0 15px; flex-wrap: wrap; }
        .tab { padding: 8px 18px; border-radius: 20px; cursor: pointer; border: 2px solid #ccc; background: white; font-size: 14px; transition: all .2s; }
        .tab.active { border-color: #333; background: #333; color: white; }
        .pending-count { display: inline-block; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; line-height: 20px; text-align: center; margin-left: 5px; vertical-align: middle; }
        #login-screen { text-align: center; margin-top: 100px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
        #login-screen h2 { margin-bottom: 20px; }
        #login-screen input { padding: 10px 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; margin-right: 8px; }
        #login-screen button { background: #333; color: white; font-size: 16px; }
        #admin-panel { display: none; }
        #summary { color: #666; font-size: 14px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Panel Administratora</h2>
    <input type="password" id="password" placeholder="Haslo admina" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Zaloguj</button>
</div>

<div id="admin-panel">
    <h2>Panel Administratora - Opinie</h2>
    <p id="summary"></p>
    <div class="tabs">
        <button class="tab active" onclick="filterEntries('wszystkie', this)">Wszystkie</button>
        <button class="tab" id="tab-oczekujace" onclick="filterEntries('oczekujacy', this)">Oczekujace <span class="pending-count" id="pending-count" style="display:none">0</span></button>
        <button class="tab" onclick="filterEntries('zatwierdzony', this)">Zatwierdzone</button>
        <button class="tab" onclick="filterEntries('odrzucony', this)">Odrzucone</button>
    </div>
    <div id="admin-entries">Ladowanie...</div>
</div>

<script>
    const ADMIN_PASSWORD = "Piotr2026";
    let currentFilter = "wszystkie";
    let allDocs = [];

    function login() {
        if (document.getElementById('password').value === ADMIN_PASSWORD) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadFirebase();
        } else {
            alert("Zle haslo!");
        }
    }

    function filterEntries(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (btn) btn.classList.add('active');
        renderEntries();
    }

    function renderEntries() {
        const container = document.getElementById('admin-entries');
        const filtered = currentFilter === "wszystkie"
            ? allDocs
            : allDocs.filter(function(d) { return d.status === currentFilter; });

        if (filtered.length === 0) {
            container.innerHTML = "<p style='color:#999'>Brak wpisow w tej kategorii.</p>";
            return;
        }

        let html = "";
        filtered.forEach(function(item) {
            const statusLabel = item.status === "zatwierdzony" ? "Zatwierdzony"
                              : item.status === "odrzucony"   ? "Odrzucony"
                              : "Oczekujacy";
            const badgeClass = item.status === "zatwierdzony" ? "badge-zatwierdzony"
                             : item.status === "odrzucony"    ? "badge-odrzucony"
                             : "badge-oczekujacy";
            const btnZatwierdz = item.status !== "zatwierdzony"
                ? '<button class="btn-zatwierdz" onclick="zmienStatus(\'' + item.id + '\', \'zatwierdzony\')">Zatwierdz</button>' : "";
            const btnOdrzuc = item.status !== "odrzucony"
                ? '<button class="btn-odrzuc" onclick="zmienStatus(\'' + item.id + '\', \'odrzucony\')">Odrzuc</button>' : "";
            const btnCofnij = item.status !== "oczekujacy"
                ? '<button class="btn-cofnij" onclick="zmienStatus(\'' + item.id + '\', \'oczekujacy\')">Cofnij</button>' : "";

            html += '<div class="entry ' + item.status + '">'
                  + '<div class="entry-header">'
                  + '<strong>' + item.autor + '</strong>'
                  + '<small style="color:gray">' + item.data + '</small>'
                  + '<span class="status-badge ' + badgeClass + '">' + statusLabel + '</span>'
                  + '</div>'
                  + '<p style="margin:10px 0 5px">' + item.tresc + '</p>'
                  + '<div class="entry-actions">' + btnZatwierdz + btnOdrzuc + btnCofnij + '</div>'
                  + '</div>';
        });
        container.innerHTML = html;
    }

    function loadFirebase() {
        const script = document.createElement('script');
        script.type = 'module';
        script.textContent = '\
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";\
            import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc }\
                from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";\
\
            const firebaseConfig = {\
                apiKey: "AIzaSyBVfH2lWIN9_h8_nI3NmnAr19jw0nlZx40",\
                authDomain: "piotrwrozy.firebaseapp.com",\
                projectId: "piotrwrozy",\
                storageBucket: "piotrwrozy.firebasestorage.app",\
                messagingSenderId: "828148388188",\
                appId: "1:828148388188:web:ceee6b95b5db8691c4b199"\
            };\
\
            const app = initializeApp(firebaseConfig);\
            const db = getFirestore(app);\
            const colRef = collection(db, "opinie");\
            const q = query(colRef, orderBy("data", "desc"));\
\
            window.zmienStatus = async (id, nowyStatus) => {\
                const ref = doc(db, "opinie", id);\
                await updateDoc(ref, { status: nowyStatus });\
            };\
\
            onSnapshot(q, (snapshot) => {\
                allDocs = snapshot.docs.map(docSnap => {\
                    const item = docSnap.data();\
                    return {\
                        id: docSnap.id,\
                        autor: item.autor || "Anonim",\
                        tresc: item.tresc || "",\
                        data: item.data ? item.data.toDate().toLocaleString("pl-PL") : "brak daty",\
                        status: item.status || "oczekujacy"\
                    };\
                });\
                const pending = allDocs.filter(d => d.status === "oczekujacy").length;\
                const countEl = document.getElementById("pending-count");\
                countEl.textContent = pending;\
                countEl.style.display = pending > 0 ? "inline-block" : "none";\
                const zatw = allDocs.filter(d => d.status === "zatwierdzony").length;\
                const odrz = allDocs.filter(d => d.status === "odrzucony").length;\
                document.getElementById("summary").textContent =\
                    "Razem: " + allDocs.length + " | Oczekujace: " + pending + " | Zatwierdzone: " + zatw + " | Odrzucone: " + odrz;\
                renderEntries();\
            });\
        ';
        document.body.appendChild(script);
    }
</script>
</body>
</html>
